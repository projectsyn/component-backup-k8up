apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: custom-ca
spec:
  backend:
    repoPasswordSecretRef:
      key: password
      name: backup-secret
    s3:
      accessKeyIDSecretRef:
        key: username
        name: s3-secret
      bucket: custom-ca-bucket
      endpoint: https://s3.example.com
      secretAccessKeySecretRef:
        key: password
        name: s3-secret
    tlsOptions:
      caCert: /mnt/ca/ca.crt
    volumeMounts:
      - mountPath: /mnt/ca/
        name: ca
  backup:
    keepJobs: 3
    promURL: http://platform-prometheus-pushgateway.syn-synsights.svc:9091
    schedule: 10 3 * * *
    volumes:
      - configMap:
          name: custom-ca
        name: ca
  check:
    promURL: http://platform-prometheus-pushgateway.syn-synsights.svc:9091
    schedule: 30 3 * * *
    volumes:
      - configMap:
          name: custom-ca
        name: ca
  prune:
    retention:
      keepDaily: 30
      keepLast: 5
    schedule: 30 2 * * *
    volumes:
      - configMap:
          name: custom-ca
        name: ca
